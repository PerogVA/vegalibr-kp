<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ВЕГАЛИБР — Калькулятор КП</title>
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4fa;color:#333;min-height:100vh}

/* ── Шапка ── */
.top-bar{background:linear-gradient(90deg,#1a1a2e,#1f5c9e);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:56px}
.top-bar img{height:34px;object-fit:contain}
.top-bar .logout{color:#aac;font-size:.8rem;text-decoration:none;
  border:1px solid #446;padding:4px 12px;border-radius:6px;transition:.2s}
.top-bar .logout:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── Layout ── */
.main{max-width:1260px;margin:28px auto;padding:0 16px;
  display:grid;grid-template-columns:420px 1fr;gap:20px;align-items:start}
@media(max-width:780px){.main{grid-template-columns:1fr}}

/* ── Карточка ── */
.card{background:#fff;border-radius:12px;padding:24px;
  box-shadow:0 2px 12px rgba(31,92,158,.10)}
.card h2{font-size:1rem;font-weight:700;color:#1f5c9e;margin-bottom:16px;
  padding-bottom:8px;border-bottom:2px solid #e8eef8}

/* ── Форма ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;font-weight:600;color:#666;margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 10px;
  border:1.5px solid #d0d8e8;border-radius:7px;font-size:.88rem;outline:none;transition:.2s}
.field input:focus,.field select:focus{border-color:#1f5c9e;
  box-shadow:0 0 0 3px rgba(31,92,158,.1)}

/* ── Дроп-зона ── */
#drop-zone{border:2.5px dashed #b0c4e0;border-radius:12px;padding:36px 20px;
  text-align:center;cursor:pointer;transition:.25s;background:#f8fafd;margin-bottom:14px}
#drop-zone.over{border-color:#1f5c9e;background:#eef4fb}
#drop-zone .icon{font-size:2.6rem;margin-bottom:8px}
#drop-zone p{font-size:.9rem;color:#666}
#drop-zone p strong{color:#1f5c9e}
#file-input{display:none}
#file-name{font-size:.8rem;color:#888;text-align:center;margin-bottom:10px;min-height:18px}

/* ── Кнопки ── */
.btn-parse{width:100%;padding:11px;background:#1f5c9e;color:#fff;
  border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-parse:hover{background:#174e8a}
.btn-parse:disabled{background:#aaa;cursor:not-allowed}
.btn-dl{width:100%;padding:12px;background:#16a34a;color:#fff;
  border:none;border-radius:8px;font-size:1rem;font-weight:700;
  cursor:pointer;transition:.2s;margin-top:10px;display:none}
.btn-dl:hover{background:#15803d}

/* ── Спиннер ── */
.spinner{display:none;text-align:center;padding:20px;color:#1f5c9e;font-size:.9rem}
.spinner::before{content:"⏳ "}

/* ── Таблица ── */
#result-wrap{display:none}
.tbl-wrap{overflow-x:auto;margin-top:12px}
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead th{background:#1f5c9e;color:#fff;padding:7px 8px;text-align:center;white-space:nowrap}
thead th:nth-child(2){text-align:left}
tbody tr:nth-child(even){background:#f5f9ff}
tbody tr:hover{background:#e8f0fb}
tbody td{padding:5px 7px;border-bottom:1px solid #e8eef4;white-space:nowrap}
tbody td:nth-child(2){white-space:normal;min-width:200px}
tfoot td{background:#d6e4f7;font-weight:700;color:#1f5c9e;padding:6px 8px}
td.r{text-align:right}
td.c{text-align:center}
.warn-row td{background:#fff3cd;font-size:.75rem;color:#856404}

/* ── Инпут кол-ва в таблице ── */
.qty-inp{width:52px;padding:2px 4px;border:1px solid #c0cfdf;border-radius:4px;
  text-align:center;font-size:.78rem;font-family:inherit;background:#f8fafd}
.qty-inp:focus{outline:none;border-color:#1f5c9e;background:#fff}

/* ── Кнопка удаления строки ── */
.del-btn{border:none;background:none;cursor:pointer;color:#cc3333;
  font-size:1rem;padding:0 4px;line-height:1;border-radius:3px;transition:.15s}
.del-btn:hover{background:#fde8e8;color:#991111}

/* ── Склад-бейдж ── */
.stk-ok{color:#15803d;font-weight:600;font-size:.75rem}
.stk-no{color:#999;font-size:.75rem}
.stk-na{color:#bbb;font-size:.75rem}

/* ── Форма добавления позиции ── */
.add-row-form{display:none;margin-top:10px;padding:12px 14px;
  background:#f0f6ff;border:1.5px dashed #a0bcdb;border-radius:8px}
.add-row-form .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.add-row-form input[type=text]{flex:1;min-width:200px;padding:7px 10px;
  border:1.5px solid #c0d0e8;border-radius:6px;font-size:.85rem;outline:none}
.add-row-form input[type=text]:focus{border-color:#1f5c9e}
.add-row-form input[type=number]{width:68px;padding:7px 8px;
  border:1.5px solid #c0d0e8;border-radius:6px;font-size:.85rem;outline:none;text-align:center}
.add-row-form .btn-add{padding:7px 16px;background:#1f5c9e;color:#fff;
  border:none;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;white-space:nowrap}
.add-row-form .btn-add:hover{background:#174e8a}
.btn-add-toggle{margin-top:8px;padding:6px 14px;background:#f0f6ff;
  border:1.5px dashed #a0bcdb;border-radius:6px;font-size:.82rem;color:#1f5c9e;
  font-weight:600;cursor:pointer;width:100%;transition:.15s}
.btn-add-toggle:hover{background:#e4eefa}

/* ── Итоги ── */
.summary{margin-top:14px;padding:14px 18px;background:#eef4fb;
  border-radius:8px;display:flex;gap:24px;flex-wrap:wrap}
.sum-item{font-size:.85rem;color:#555}
.sum-item strong{display:block;font-size:1.05rem;color:#1f5c9e;font-weight:700}

/* ── Ошибка ── */
.error-box{padding:12px 16px;background:#fff0f0;border:1px solid #f5c2c2;
  border-radius:8px;color:#cc2222;font-size:.85rem;margin-top:10px;display:none}

/* ── АА-список ── */
.aa-box{margin-top:12px;padding:12px;background:#fff8e6;border:1px solid #ffe083;
  border-radius:8px;display:none}
.aa-box h3{font-size:.82rem;font-weight:700;color:#9a6200;margin-bottom:6px}
.aa-box li{font-size:.78rem;color:#6b4f00;margin-left:16px;margin-bottom:2px}
</style>
</head>
<body>

<div class="top-bar">
  <img src="/static/logo.png" alt="ВЕГАЛИБР">
  <a href="/logout" class="logout">Выйти</a>
</div>

<div class="main">

  <!-- ── Левая панель ── -->
  <div>
    <div class="card">
      <h2>Параметры КП</h2>

      <div class="field">
        <label>Заказчик</label>
        <input type="text" id="customer" placeholder="ООО «Название»">
      </div>
      <div class="field">
        <label>Номер счёта</label>
        <input type="text" id="order_num" placeholder="1234/2026">
      </div>
      <div class="field">
        <label>Менеджер</label>
        <input type="text" id="manager" value="Перог Вадим Александрович">
      </div>

      <div class="field">
        <label>Скидка на товар, %</label>
        <input type="number" id="discount" value="0" min="0" max="99" style="width:80px">
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-top:4px;margin-bottom:4px">
        <input type="checkbox" id="include_kalib" checked
               style="width:18px;height:18px;cursor:pointer;accent-color:#1f5c9e">
        <label for="include_kalib" style="font-size:.88rem;font-weight:600;color:#444;cursor:pointer;margin:0">
          Включить калибровку / поверку
        </label>
      </div>

      <div class="card" style="margin-top:16px;padding:16px">
        <h2>Загрузка заявки</h2>

        <!-- Вкладки -->
        <div style="display:flex;gap:6px;margin-bottom:12px">
          <button onclick="switchTab('file')" id="tab-file"
            style="flex:1;padding:7px;border-radius:7px;border:1.5px solid #1f5c9e;
                   background:#1f5c9e;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer">
            📁 Файл
          </button>
          <button onclick="switchTab('text')" id="tab-text"
            style="flex:1;padding:7px;border-radius:7px;border:1.5px solid #b0c4e0;
                   background:#f0f4fa;color:#1f5c9e;font-size:.82rem;font-weight:600;cursor:pointer">
            📋 Текст
          </button>
        </div>

        <!-- Панель файла -->
        <div id="panel-file">
          <div id="drop-zone">
            <div class="icon">📂</div>
            <p>Перетащи сюда <strong>.xlsx</strong> или <strong>.pdf</strong></p>
          </div>
          <input type="file" id="file-input" accept=".xlsx,.xls,.pdf" style="display:none">
          <label for="file-input" style="
            display:block;width:100%;padding:9px;margin-bottom:8px;box-sizing:border-box;
            background:#f0f4fa;border:1.5px solid #b0c4e0;border-radius:8px;
            font-size:.88rem;color:#1f5c9e;font-weight:600;cursor:pointer;
            text-align:center;user-select:none;">
            📁 Выбрать файл
          </label>
          <div id="file-name">файл не выбран</div>
        </div>

        <!-- Панель текста -->
        <div id="panel-text" style="display:none">
          <textarea id="raw-text" placeholder="Вставь текст из Word, письма или таблицы...
Пример:
Калибр-скоба 6,48 h11 ПР-НЕ ГОСТ 18360-93    12
Калибр-пробка гладкая 2,0 H14 ПР-НЕ    6"
            style="width:100%;height:180px;padding:10px;
                   border:1.5px solid #b0c4e0;border-radius:8px;
                   font-size:.82rem;resize:vertical;outline:none;
                   font-family:monospace"></textarea>
        </div>

        <button class="btn-parse" id="btn-parse" onclick="parseFile()" disabled>
          Рассчитать
        </button>
      </div>
    </div>
  </div>

  <!-- ── Правая панель ── -->
  <div>
    <div class="card">
      <h2>Результат расчёта</h2>

      <div class="spinner" id="spinner">Обработка файла…</div>
      <div class="error-box" id="err-box"></div>

      <div id="result-wrap">
        <div class="tbl-wrap">
          <table id="result-table">
            <thead>
              <tr>
                <th>№</th>
                <th>Наименование</th>
                <th>Кол.</th>
                <th>Цена</th>
                <th>Скидка</th>
                <th>Цена со ск.</th>
                <th>Калибр.</th>
                <th>Сумма б/НДС</th>
                <th>НДС</th>
                <th>Итого</th>
                <th>Склад</th>
                <th style="width:28px"></th>
              </tr>
            </thead>
            <tbody id="result-body"></tbody>
            <tfoot id="result-foot"></tfoot>
          </table>

          <button class="btn-add-toggle" id="btn-add-toggle" onclick="toggleAddForm()">
            + Добавить позицию вручную
          </button>
          <button class="btn-add-toggle" id="btn-drawing" onclick="document.getElementById('drawing-input').click()" style="margin-left:8px;background:#e8f0fa;color:#1f5c9e;border:1.5px solid #1f5c9e;">
            📐 Чертёж → Запрос
          </button>
          <input type="file" id="drawing-input" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp" style="display:none" onchange="uploadDrawing(this)">
          <div class="add-row-form" id="add-row-form">
            <div class="row">
              <input type="text" id="add-name" placeholder="Наименование калибра (напр. Кольцо резьбовое М10×1,5 6g НЕ)">
              <input type="number" id="add-qty" value="1" min="1" max="9999" title="Кол-во">
              <button class="btn-add" onclick="addRowManual()">Добавить</button>
            </div>
            <div id="add-err" style="font-size:.78rem;color:#cc3333;margin-top:6px;display:none"></div>
          </div>
        </div>

        <div class="summary" id="summary"></div>

        <div class="aa-box" id="aa-box">
          <h3>⚠ Требуют уточнения у АА (не удалось определить цену):</h3>
          <ul id="aa-list"></ul>
        </div>

        <button class="btn-dl" id="btn-dl" onclick="downloadKP()">
          ⬇ Скачать КП (.docx)
        </button>
      </div>
    </div>
  </div>

</div>

<script>
let parsedData = null;
let activeTab  = 'file';

// ── Вкладки ──────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('panel-file').style.display = tab === 'file' ? '' : 'none';
  document.getElementById('panel-text').style.display = tab === 'text' ? '' : 'none';
  const tf = document.getElementById('tab-file');
  const tt = document.getElementById('tab-text');
  if (tab === 'file') {
    tf.style.background='#1f5c9e'; tf.style.color='#fff'; tf.style.borderColor='#1f5c9e';
    tt.style.background='#f0f4fa'; tt.style.color='#1f5c9e'; tt.style.borderColor='#b0c4e0';
  } else {
    tt.style.background='#1f5c9e'; tt.style.color='#fff'; tt.style.borderColor='#1f5c9e';
    tf.style.background='#f0f4fa'; tf.style.color='#1f5c9e'; tf.style.borderColor='#b0c4e0';
  }
  document.getElementById('btn-parse').disabled =
    tab === 'file' ? !fi.fileObj : !document.getElementById('raw-text').value.trim();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('raw-text').addEventListener('input', function() {
    if (activeTab === 'text')
      document.getElementById('btn-parse').disabled = !this.value.trim();
  });
});

// ── Drag & drop ──────────────────────────────────────────────────────────────
const dz   = document.getElementById('drop-zone');
const fi   = document.getElementById('file-input');
const fnEl = document.getElementById('file-name');
const btnP = document.getElementById('btn-parse');

dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
});
fi.addEventListener('change', () => { if (fi.files.length) setFile(fi.files[0]); });

function setFile(f) {
  fnEl.textContent = f.name;
  fi.fileObj = f;
  btnP.disabled = false;
}

// ── Форматирование ────────────────────────────────────────────────────────────
function fmt(v) {
  return Number(v).toLocaleString('ru-RU', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Парсинг файла / текста ────────────────────────────────────────────────────
async function parseFile() {
  document.getElementById('spinner').style.display    = 'block';
  document.getElementById('result-wrap').style.display = 'none';
  document.getElementById('err-box').style.display    = 'none';
  document.getElementById('btn-dl').style.display     = 'none';
  parsedData = null;

  const fd = new FormData();
  fd.append('include_kalib', document.getElementById('include_kalib').checked ? 'true' : 'false');
  fd.append('discount', document.getElementById('discount').value || '0');

  if (activeTab === 'text') {
    const txt = document.getElementById('raw-text').value.trim();
    if (!txt) { showError('Вставьте текст'); return; }
    fd.append('raw_text', txt);
  } else {
    const f = fi.fileObj || fi.files[0];
    if (!f) return;
    fd.append('file', f);
  }

  try {
    const r    = await fetch('/parse', {method:'POST', body:fd});
    const data = await r.json();
    document.getElementById('spinner').style.display = 'none';
    if (data.error) { showError(data.error); return; }
    parsedData = data;
    renderTable();
  } catch(e) {
    document.getElementById('spinner').style.display = 'none';
    showError('Ошибка соединения: ' + e.message);
  }
}

function showError(msg) {
  const b = document.getElementById('err-box');
  b.textContent = msg; b.style.display = 'block';
}

// ── Склад-бейдж ───────────────────────────────────────────────────────────────
function stockBadge(qty) {
  if (qty === null || qty === undefined) return '<span class="stk-na">—</span>';
  if (qty > 0)  return `<span class="stk-ok">✓ ${qty} шт.</span>`;
  return '<span class="stk-no">нет</span>';
}

// ── Рендер таблицы ────────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('result-body');
  tbody.innerHTML = '';

  (parsedData.items || []).forEach((it, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="c" style="color:#888;font-size:.72rem">${i+1}</td>
      <td>${escH(it.name)}</td>
      <td class="c"><input class="qty-inp" type="number" value="${it.qty}" min="1" max="9999"
          onchange="onQtyChange(this,${i})" onkeydown="if(event.key==='Enter')this.blur()"></td>
      <td class="r">${fmt(it.price)}</td>
      <td class="r">−${fmt(it.disc)}</td>
      <td class="r">${fmt(it.price_d)}</td>
      <td class="r">${fmt(it.kal)}</td>
      <td class="r row-s">${fmt(it.summa)}</td>
      <td class="r row-n">${fmt(it.nds)}</td>
      <td class="r row-i">${fmt(it.itogo)}</td>
      <td class="c">${stockBadge(it.stock)}</td>
      <td class="c"><button class="del-btn" onclick="deleteRow(${i})" title="Удалить">×</button></td>
    `;
    tbody.appendChild(tr);
  });

  renderFoot();
  renderAA();
  renderSummary();

  document.getElementById('result-wrap').style.display = 'block';
  document.getElementById('btn-dl').style.display =
    (parsedData.items || []).length ? 'block' : 'none';
  document.getElementById('btn-add-toggle').style.display = 'block';
}

function renderFoot() {
  const foot = document.getElementById('result-foot');
  foot.innerHTML = '';
  const items = parsedData.items || [];
  const totBez = items.reduce((s,it) => s + it.summa, 0);
  const totNds = items.reduce((s,it) => s + it.nds,   0);
  const totTot = items.reduce((s,it) => s + it.itogo,  0);

  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td colspan="7" style="text-align:right;padding-right:8px">ИТОГО:</td>
    <td class="r">${fmt(totBez)}</td>
    <td class="r">${fmt(totNds)}</td>
    <td class="r">${fmt(totTot)}</td>
    <td colspan="2"></td>
  `;
  foot.appendChild(tr);
  return {totBez, totNds, totTot};
}

function renderSummary() {
  const items  = parsedData.items || [];
  const totBez = items.reduce((s,it) => s + it.summa, 0);
  const totNds = items.reduce((s,it) => s + it.nds,   0);
  const totTot = items.reduce((s,it) => s + it.itogo,  0);
  document.getElementById('summary').innerHTML = `
    <div class="sum-item"><strong>${items.length}</strong>позиций</div>
    <div class="sum-item"><strong>${fmt(totBez)} ₽</strong>без НДС</div>
    <div class="sum-item"><strong>${fmt(totNds)} ₽</strong>НДС 22%</div>
    <div class="sum-item"><strong>${fmt(totTot)} ₽</strong>итого с НДС</div>
  `;
}

function renderAA() {
  const aaBox  = document.getElementById('aa-box');
  const aaList = document.getElementById('aa-list');
  aaList.innerHTML = '';
  const aa = parsedData.aa || [];
  if (aa.length) {
    aa.forEach(x => {
      const li = document.createElement('li');
      li.textContent = `${x.name} × ${x.qty} шт.`;
      aaList.appendChild(li);
    });
    aaBox.style.display = 'block';
  } else {
    aaBox.style.display = 'none';
  }
}

// ── Изменение кол-ва ──────────────────────────────────────────────────────────
function onQtyChange(inp, idx) {
  const raw = parseInt(inp.value);
  const qty = isNaN(raw) || raw < 1 ? 1 : Math.min(raw, 9999);
  inp.value = qty;

  const it = parsedData.items[idx];
  it.qty   = qty;
  it.summa = Math.round(qty * (it.price_d + it.kal) * 100) / 100;
  it.nds   = Math.round(it.summa * 0.22 * 100) / 100;
  it.itogo = Math.round((it.summa + it.nds) * 100) / 100;

  const tr = inp.closest('tr');
  tr.querySelector('.row-s').textContent = fmt(it.summa);
  tr.querySelector('.row-n').textContent = fmt(it.nds);
  tr.querySelector('.row-i').textContent = fmt(it.itogo);

  renderFoot();
  renderSummary();
}

// ── Удаление строки ───────────────────────────────────────────────────────────
function deleteRow(idx) {
  parsedData.items.splice(idx, 1);
  renderTable();
}

// ── Ручное добавление позиции ─────────────────────────────────────────────────
function toggleAddForm() {
  const f = document.getElementById('add-row-form');
  const isOpen = f.style.display === 'block';
  f.style.display = isOpen ? 'none' : 'block';
  document.getElementById('btn-add-toggle').textContent =
    isOpen ? '+ Добавить позицию вручную' : '− Скрыть форму добавления';
  if (!isOpen) document.getElementById('add-name').focus();
}

async function addRowManual() {
  const name = document.getElementById('add-name').value.trim();
  const qty  = Math.max(1, parseInt(document.getElementById('add-qty').value) || 1);
  const errEl = document.getElementById('add-err');
  errEl.style.display = 'none';

  if (!name) { errEl.textContent = 'Введите наименование'; errEl.style.display='block'; return; }
  if (!parsedData) { errEl.textContent = 'Сначала выполните расчёт'; errEl.style.display='block'; return; }

  const btn = document.querySelector('.btn-add');
  btn.disabled = true; btn.textContent = '…';

  try {
    const r = await fetch('/calc-single', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name, qty,
        include_kalib: document.getElementById('include_kalib').checked,
        discount: parseFloat(document.getElementById('discount').value || '0'),
      })
    });
    const d = await r.json();

    if (d.error) {
      errEl.textContent = d.error; errEl.style.display = 'block';
    } else if (d.items && d.items.length) {
      d.items.forEach(it => parsedData.items.push(it));
      document.getElementById('add-name').value = '';
      document.getElementById('add-qty').value  = '1';
      renderTable();
    } else if (d.aa) {
      if (!parsedData.aa) parsedData.aa = [];
      parsedData.aa.push(d.aa);
      errEl.textContent = `«${name}» не найдена в прайсе — добавлена в список АА`;
      errEl.style.color = '#9a6200'; errEl.style.display = 'block';
      renderAA();
    }
  } catch(e) {
    errEl.textContent = 'Ошибка: ' + e.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Добавить';
    errEl.style.color = '#cc3333';
  }
}

// Enter в поле имени — добавить
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('add-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addRowManual();
  });
});

// ── Скачать Word ──────────────────────────────────────────────────────────────
async function downloadKP() {
  if (!parsedData) return;

  const payload = {
    items:     parsedData.items,
    aa:        parsedData.aa || [],
    customer:  document.getElementById('customer').value,
    order_num: document.getElementById('order_num').value,
    manager:   document.getElementById('manager').value,
    discount:  parseFloat(document.getElementById('discount').value || '0'),
  };

  const r = await fetch('/generate', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });

  if (!r.ok) { const d = await r.json(); showError(d.error); return; }

  const blob = await r.blob();
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const fn   = payload.order_num ? `КП_${payload.order_num}.docx` : 'КП_ВЕГАЛИБР.docx';
  a.href = url; a.download = fn; a.click();
  URL.revokeObjectURL(url);
}

// ── Загрузка чертежа → Word-документ ─────────────────────────────────────────
async function uploadDrawing(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const btn = document.getElementById('btn-drawing');
  btn.textContent = '⏳ Анализирую...';
  btn.disabled = true;

  const fd = new FormData();
  fd.append('file', file);

  try {
    const r = await fetch('/drawing-doc', { method: 'POST', body: fd });

    if (!r.ok) {
      const text = await r.text();
      let msg = text;
      try { msg = JSON.parse(text).error || text; } catch(_) {}
      alert('Ошибка: ' + msg.slice(0, 300));
      btn.textContent = '📐 Чертёж → Запрос'; btn.disabled = false;
      return;
    }

    // Скачиваем docx
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    // Имя файла из заголовка ответа
    const cd   = r.headers.get('Content-Disposition') || '';
    const fnm  = cd.match(/filename\*?=(?:UTF-8'')?([^;]+)/i);
    a.download = fnm ? decodeURIComponent(fnm[1].replace(/"/g,'')) : 'Запрос.docx';
    a.href = url; a.click();
    URL.revokeObjectURL(url);

  } catch(e) {
    alert('Ошибка сети: ' + e.message);
  }

  btn.textContent = '📐 Чертёж → Запрос'; btn.disabled = false;
}
